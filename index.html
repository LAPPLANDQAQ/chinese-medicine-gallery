<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国医学发展史 | History of Chinese Medicine</title>
    <style>
      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #0b0f19;
        color: #f5ead2;
        font-family:
          "Noto Serif SC",
          "Microsoft YaHei",
          "PingFang SC",
          serif;
      }

      body {
        overflow-x: hidden;
      }

      #app {
        position: relative;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 18%, rgba(178, 133, 58, 0.16), transparent 34%),
          linear-gradient(180deg, rgba(11, 15, 25, 0.82), #0b0f19 58%);
      }

      #webgl-container,
      #css3d-container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #webgl-container {
        z-index: 1;
      }

      #css3d-container {
        z-index: 2;
        pointer-events: none;
      }

      #scroll-stage {
        position: relative;
        z-index: 3;
        min-height: 560vh;
        pointer-events: none;
      }

      .hero-copy {
        position: fixed;
        z-index: 4;
        top: clamp(32px, 6vh, 72px);
        left: clamp(24px, 6vw, 96px);
        max-width: 560px;
        pointer-events: none;
      }

      .hero-copy__eyebrow {
        margin: 0 0 12px;
        color: #d3b06c;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .hero-copy__title {
        margin: 0;
        font-size: clamp(38px, 5vw, 72px);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .hero-copy__summary {
        margin: 18px 0 0;
        color: rgba(245, 234, 210, 0.76);
        font-size: clamp(15px, 1.3vw, 18px);
        line-height: 1.8;
      }

      .timeline-card {
        width: min(420px, 82vw);
        max-height: min(640px, 80vh);
        overflow: hidden;
        border: 1px solid rgba(211, 176, 108, 0.24);
        border-radius: 8px;
        background: rgba(17, 21, 33, 0.88);
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.32);
        color: #f5ead2;
        opacity: 0.66;
        filter: saturate(0.72);
        pointer-events: auto;
        transform-origin: center center;
        transition:
          transform 240ms ease,
          border-color 240ms ease,
          box-shadow 240ms ease,
          background-color 240ms ease,
          filter 240ms ease,
          opacity 240ms ease;
        will-change: transform;
      }

      .timeline-card:focus-visible {
        outline: 2px solid rgba(229, 191, 111, 0.84);
        outline-offset: 4px;
      }

      .timeline-card:hover {
        border-color: rgba(229, 191, 111, 0.72);
        background: rgba(22, 27, 40, 0.94);
        box-shadow:
          0 22px 54px rgba(0, 0, 0, 0.42),
          0 0 26px rgba(211, 176, 108, 0.2);
        opacity: 0.86;
        filter: saturate(0.95);
        transform: scale(1.025);
      }

      .timeline-card__media-strip {
        display: grid;
        position: relative;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-auto-flow: column;
        gap: 8px;
        min-height: 108px;
        max-height: 124px;
        padding: 12px;
        overflow: hidden;
        background: rgba(6, 9, 15, 0.52);
      }

      .timeline-card__image-frame {
        position: relative;
        width: 100%;
        height: 100px;
        min-width: 0;
        margin: 0;
        border: 1px solid rgba(245, 234, 210, 0.12);
        border-radius: 6px;
        background:
          linear-gradient(135deg, rgba(211, 176, 108, 0.2), rgba(11, 15, 25, 0.42)),
          radial-gradient(circle at 35% 20%, rgba(245, 234, 210, 0.1), transparent 44%),
          rgba(245, 234, 210, 0.06);
        overflow: hidden;
      }

      .timeline-card__image-frame.is-missing::after {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 10px;
        color: rgba(245, 234, 210, 0.7);
        content: attr(data-fallback-text);
        font-size: 13px;
        line-height: 1.4;
        text-align: center;
      }

      .timeline-card__image-item {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
      }

      .timeline-card__hidden-count {
        position: absolute;
        right: 20px;
        bottom: 20px;
        display: grid;
        min-width: 42px;
        height: 30px;
        place-items: center;
        border: 1px solid rgba(229, 191, 111, 0.55);
        border-radius: 999px;
        background: rgba(11, 15, 25, 0.78);
        color: #f3d79b;
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        box-shadow: 0 0 18px rgba(211, 176, 108, 0.2);
      }

      .timeline-card__body {
        max-height: 468px;
        overflow: hidden;
        padding: 20px 22px 22px;
      }

      .timeline-card__period {
        margin: 0;
        color: #d3b06c;
        font-size: 13px;
        letter-spacing: 0.14em;
      }

      .timeline-card__time {
        margin: 8px 0 0;
        color: rgba(245, 234, 210, 0.58);
        font-size: 13px;
      }

      .timeline-card__title {
        margin: 12px 0 0;
        font-size: 25px;
        line-height: 1.28;
        letter-spacing: 0;
      }

      .timeline-card__summary {
        margin: 14px 0 0;
        color: rgba(245, 234, 210, 0.78);
        font-size: 15px;
        line-height: 1.75;
      }

      .timeline-card__sections {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .timeline-card__section {
        border-top: 1px solid rgba(245, 234, 210, 0.1);
        padding-top: 12px;
      }

      .timeline-card__section h3 {
        margin: 0;
        color: #e5bf6f;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .timeline-card__section p {
        margin: 8px 0 0;
        color: rgba(245, 234, 210, 0.7);
        font-size: 14px;
        line-height: 1.65;
      }

      .timeline-card.is-active {
        border-color: rgba(244, 207, 132, 0.96);
        background: rgba(24, 29, 42, 0.96);
        box-shadow:
          0 28px 82px rgba(0, 0, 0, 0.58),
          0 0 44px rgba(216, 170, 91, 0.38),
          inset 0 0 0 1px rgba(245, 234, 210, 0.08);
        opacity: 1;
        filter: saturate(1.12);
      }

      .timeline-card.is-expanded {
        width: min(600px, 88vw);
        max-height: min(720px, 86vh);
        opacity: 0.96;
        filter: saturate(1);
        overflow-y: auto;
      }

      .timeline-card.is-active.is-expanded {
        opacity: 1;
        filter: saturate(1.14);
      }

      .timeline-card.is-expanded .timeline-card__media-strip {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-auto-flow: row;
        min-height: 0;
        max-height: 360px;
        overflow-y: auto;
      }

      .timeline-card.is-expanded .timeline-card__image-frame {
        height: 104px;
      }

      .timeline-card.is-expanded .timeline-card__body {
        max-height: none;
        overflow: visible;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="webgl-container"></div>
      <div id="css3d-container"></div>

      <header class="hero-copy">
        <p class="hero-copy__eyebrow">History of Chinese Medicine</p>
        <h1 class="hero-copy__title">中国医学发展史</h1>
        <p class="hero-copy__summary">
          从上古经验医学到现代科学传承，后续阶段将以 Three.js 圆柱螺旋画廊呈现中国医学的发展脉络。
        </p>
      </header>

      <main id="scroll-stage"></main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
