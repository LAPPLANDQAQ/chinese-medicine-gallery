<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国医学发展史 | History of Chinese Medicine</title>
    <style>
      :root {
        --ink-deep: #0b0a07;
        --ink-dark: #110f0b;
        --ink-surface: #181510;
        --ink-border: rgba(160, 142, 108, 0.12);
        --ink-border-active: rgba(160, 142, 108, 0.30);
        --paper-primary: #ede4d0;
        --paper-secondary: rgba(237, 228, 208, 0.66);
        --paper-muted: rgba(237, 228, 208, 0.40);
        --seal-red: #b8453a;
        --seal-red-glow: rgba(184, 69, 58, 0.20);
        --seal-gold: #b8945c;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #0b0a07;
        color: #f5ead2;
        font-family:
          "Noto Serif SC",
          "Microsoft YaHei",
          "PingFang SC",
          serif;
      }

      body {
        overflow-x: hidden;
      }

      #app {
        position: relative;
        min-height: 100vh;
        background:
          radial-gradient(ellipse at 25% 12%, rgba(180, 160, 120, 0.06), transparent 48%),
          radial-gradient(ellipse at 72% 58%, rgba(184, 69, 58, 0.03), transparent 42%),
          radial-gradient(circle at 50% 50%, rgba(210, 195, 160, 0.03) 0%, transparent 68%),
          linear-gradient(175deg, #0d0c08 0%, #0b0a07 35%, #110f0b 100%);
      }

      #webgl-container,
      #css3d-container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #webgl-container {
        z-index: 1;
      }

      #css3d-container {
        z-index: 2;
        pointer-events: none;
      }

      #scroll-stage {
        position: relative;
        z-index: 3;
        min-height: 520vh;
        pointer-events: none;
      }

      .hero-copy {
        position: fixed;
        z-index: 4;
        top: clamp(32px, 6vh, 72px);
        left: clamp(24px, 6vw, 96px);
        max-width: 560px;
        pointer-events: none;
      }

      .hero-copy__eyebrow {
        margin: 0 0 12px;
        color: #b8945c;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .hero-copy__title {
        margin: 0;
        font-size: clamp(38px, 5vw, 72px);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .hero-copy__summary {
        margin: 18px 0 0;
        color: rgba(237, 228, 208, 0.66);
        font-size: clamp(15px, 1.3vw, 18px);
        line-height: 1.8;
      }

      .timeline-card {
        width: min(420px, 82vw);
        max-height: min(640px, 80vh);
        overflow: hidden;
        border: 1px solid rgba(211, 176, 108, 0.24);
        border-radius: 8px;
        background: rgba(17, 21, 33, 0.88);
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.32);
        color: #f5ead2;
        opacity: 0.66;
        filter: saturate(0.72);
        pointer-events: auto;
        transform-origin: center center;
        transition:
          transform 240ms ease,
          border-color 240ms ease,
          box-shadow 240ms ease,
          background-color 240ms ease,
          filter 240ms ease,
          opacity 240ms ease;
        will-change: transform;
      }

      .timeline-card:focus-visible {
        outline: 2px solid rgba(229, 191, 111, 0.84);
        outline-offset: 4px;
      }

      .timeline-card:hover {
        border-color: rgba(229, 191, 111, 0.72);
        background: rgba(22, 27, 40, 0.94);
        box-shadow:
          0 22px 54px rgba(0, 0, 0, 0.42),
          0 0 26px rgba(211, 176, 108, 0.2);
        opacity: 0.86;
        filter: saturate(0.95);
        transform: scale(1.025);
      }

      .timeline-card__media-strip {
        display: grid;
        position: relative;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-auto-flow: column;
        gap: 8px;
        min-height: 108px;
        max-height: 124px;
        padding: 12px;
        overflow: hidden;
        background: rgba(6, 9, 15, 0.52);
      }

      .timeline-card__image-frame {
        position: relative;
        width: 100%;
        height: 100px;
        min-width: 0;
        margin: 0;
        border: 1px solid rgba(245, 234, 210, 0.12);
        border-radius: 6px;
        background:
          linear-gradient(135deg, rgba(211, 176, 108, 0.2), rgba(11, 15, 25, 0.42)),
          radial-gradient(circle at 35% 20%, rgba(245, 234, 210, 0.1), transparent 44%),
          rgba(245, 234, 210, 0.06);
        overflow: hidden;
      }

      .timeline-card__image-frame.is-missing::after {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 10px;
        color: rgba(245, 234, 210, 0.7);
        content: attr(data-fallback-text);
        font-size: 13px;
        line-height: 1.4;
        text-align: center;
      }

      .timeline-card__image-item {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
      }

      .timeline-card__hidden-count {
        position: absolute;
        right: 20px;
        bottom: 20px;
        display: grid;
        min-width: 42px;
        height: 30px;
        place-items: center;
        border: 1px solid rgba(229, 191, 111, 0.55);
        border-radius: 999px;
        background: rgba(11, 15, 25, 0.78);
        color: #f3d79b;
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        box-shadow: 0 0 18px rgba(211, 176, 108, 0.2);
      }

      .timeline-card__body {
        max-height: 468px;
        overflow: hidden;
        padding: 20px 22px 22px;
      }

      .timeline-card__period {
        margin: 0;
        color: #d3b06c;
        font-size: 13px;
        letter-spacing: 0.14em;
      }

      .timeline-card__time {
        margin: 8px 0 0;
        color: rgba(245, 234, 210, 0.58);
        font-size: 13px;
      }

      .timeline-card__title {
        margin: 12px 0 0;
        font-size: 25px;
        line-height: 1.28;
        letter-spacing: 0;
      }

      .timeline-card__summary {
        margin: 14px 0 0;
        color: rgba(245, 234, 210, 0.78);
        font-size: 15px;
        line-height: 1.75;
      }

      .timeline-card__sections {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .timeline-card__section {
        border-top: 1px solid rgba(245, 234, 210, 0.1);
        padding-top: 12px;
      }

      .timeline-card__section h3 {
        margin: 0;
        color: #e5bf6f;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .timeline-card__section p {
        margin: 8px 0 0;
        color: rgba(245, 234, 210, 0.7);
        font-size: 14px;
        line-height: 1.65;
      }

      .timeline-card.is-active {
        border-color: rgba(244, 207, 132, 0.96);
        background: rgba(24, 29, 42, 0.96);
        box-shadow:
          0 28px 82px rgba(0, 0, 0, 0.58),
          0 0 44px rgba(216, 170, 91, 0.38),
          inset 0 0 0 1px rgba(245, 234, 210, 0.08);
        opacity: 1;
        filter: saturate(1.12);
      }

      .timeline-card.is-expanded {
        width: min(600px, 88vw);
        max-height: min(720px, 86vh);
        opacity: 0.96;
        filter: saturate(1);
        overflow-y: auto;
      }

      .timeline-card.is-active.is-expanded {
        opacity: 1;
        filter: saturate(1.14);
      }

      .timeline-card.is-expanded .timeline-card__media-strip {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-auto-flow: row;
        min-height: 0;
        max-height: 360px;
        overflow-y: auto;
      }

      .timeline-card.is-expanded .timeline-card__image-frame {
        height: 104px;
      }

      .timeline-card.is-expanded .timeline-card__body {
        max-height: none;
        overflow: visible;
      }

      /* ========== 新增：水墨风样式 ========== */

      /* 筛选标签栏 */
      .filter-bar {
        position: fixed;
        top: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        display: flex;
        gap: 12px;
        pointer-events: auto;
      }

      .filter-tag {
        padding: 6px 22px;
        border: 1px solid var(--ink-border);
        border-radius: 3px;
        background: rgba(12, 17, 25, 0.68);
        color: var(--paper-secondary);
        font-family: "Noto Serif SC", "Microsoft YaHei", serif;
        font-size: 14px;
        cursor: pointer;
        letter-spacing: 0.08em;
        transition:
          all 320ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
        user-select: none;
        white-space: nowrap;
      }

      .filter-tag:hover {
        border-color: var(--ink-border-active);
        color: var(--paper-primary);
        background: rgba(19, 24, 34, 0.84);
      }

      .filter-tag.is-active {
        border-color: var(--seal-red);
        color: var(--seal-red);
        box-shadow: 0 0 14px var(--seal-red-glow);
        background: rgba(184, 69, 58, 0.08);
      }

      /* 图片项（透明漂浮） */
      .image-item {
        pointer-events: auto;
      }

      .image-item__inner {
        display: inline-block;
        cursor: pointer;
        background: transparent;
        opacity: 0.58;
        transition:
          transform 320ms cubic-bezier(0.25, 0.46, 0.45, 0.94),
          opacity 360ms ease,
          box-shadow 320ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .image-item__inner:hover {
        transform: scale(1.05);
        opacity: 1;
        box-shadow:
          0 0 32px rgba(184, 69, 58, 0.24),
          0 16px 52px rgba(0, 0, 0, 0.5);
      }

      .image-item__inner.is-filter-visible {
        opacity: 0.9;
        transform: scale(1.0);
        transition-duration: 560ms;
      }

      .image-item__inner.is-filter-hidden {
        opacity: 0;
        transform: scale(0.28);
        pointer-events: none;
        transition-duration: 500ms;
      }

      .image-item__img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: contain;
        user-select: none;
      }

      .image-item__img.is-loading {
        opacity: 0;
      }

      .image-item__img.is-loaded {
        opacity: 1;
        transition: opacity 500ms ease;
        animation: ink-float 5s ease-in-out infinite;
      }

      /* 水墨漂浮动画 */
      @keyframes ink-float {
        0%, 100% {
          transform: translateY(0) scale(1);
        }
        25% {
          transform: translateY(-7px) scale(1.03);
        }
        50% {
          transform: translateY(-3px) scale(1.01);
        }
        75% {
          transform: translateY(5px) scale(0.98);
        }
      }

      /* 筛选抽出动画 — 图片从螺旋中弹入 */
      .image-item__inner.is-filter-pulled {
        animation: pull-from-spiral 620ms cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
      }

      @keyframes pull-from-spiral {
        0% {
          opacity: 0;
          transform: scale(0.15) rotateY(60deg);
          filter: blur(4px);
        }
        60% {
          opacity: 1;
          transform: scale(1.06) rotateY(-3deg);
          filter: blur(0);
        }
        100% {
          opacity: 1;
          transform: scale(1.0) rotateY(0);
          filter: blur(0);
        }
      }

      /* 详情浮层 — 透明底，图片缩放 + 流式文字 */
      .detail-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        opacity: 0;
        transition: opacity 380ms ease;
      }

      .detail-overlay.is-open {
        pointer-events: auto;
        opacity: 1;
      }

      .detail-overlay__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(11, 10, 7, 0.0);
        transition: background 500ms ease;
      }

      .detail-overlay.is-open .detail-overlay__backdrop {
        background: rgba(11, 10, 7, 0.82);
      }

      /* 详情标题 — 顶部居中，与图片同步显示 */
      .detail-zoom-title {
        position: fixed;
        z-index: 12;
        top: 8vh;
        left: 0;
        width: 48vw;
        text-align: center;
        color: #b8945c;
        font-family: "FangSong", "仿宋", "Noto Serif SC", serif;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.06em;
        opacity: 0;
        transform: translateY(-10px);
        transition: opacity 480ms ease, transform 480ms ease;
        pointer-events: none;
        user-select: none;
      }

      .detail-zoom-title.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* 缩放图片 */
      .detail-zoom-image {
        position: fixed;
        z-index: 11;
        pointer-events: none;
        object-fit: contain;
        border-radius: 2px;
        transition: all 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
      }

      .detail-zoom-image.is-zoomed {
        transition: none;
      }

      /* 关闭按钮 */
      .detail-overlay__close {
        position: fixed;
        z-index: 13;
        top: 24px;
        right: 24px;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(148, 130, 100, 0.18);
        border-radius: 50%;
        background: rgba(13, 17, 25, 0.72);
        color: rgba(237, 228, 208, 0.6);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.8);
        transition:
          opacity 300ms ease,
          transform 300ms ease,
          border-color 240ms ease,
          color 240ms ease,
          box-shadow 240ms ease;
      }

      .detail-overlay__close.is-visible {
        opacity: 1;
        transform: scale(1);
      }

      .detail-overlay__close:hover {
        border-color: rgba(184, 69, 58, 0.6);
        color: #ede4d0;
        box-shadow: 0 0 14px rgba(184, 69, 58, 0.18);
      }

      /* 流式文字面板 — 透明底，右侧淡入 */
      .detail-text-panel {
        position: fixed;
        z-index: 12;
        right: clamp(16px, 4vw, 48px);
        top: 50%;
        transform: translateY(-50%);
        width: min(520px, 40vw);
        max-height: 72vh;
        overflow-y: auto;
        padding: 0;
        color: #ede4d0;
        font-family: "FangSong", "仿宋", "Noto Serif SC", serif;
        opacity: 0;
        transition: opacity 500ms ease;
        pointer-events: none;
      }

      .detail-text-panel.is-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .detail-text-panel__period {
        color: #b8453a;
        font-size: 12px;
        letter-spacing: 0.14em;
        margin: 0;
        min-height: 1.2em;
      }

      .detail-text-panel__title {
        margin: 6px 0 0;
        font-size: 24px;
        font-weight: 600;
        line-height: 1.35;
        min-height: 1.2em;
      }

      .detail-text-panel__caption {
        margin: 10px 0 0;
        font-size: 14px;
        line-height: 1.75;
        color: rgba(237, 228, 208, 0.62);
        min-height: 1em;
      }

      .detail-text-panel__description {
        margin: 12px 0 0;
        font-size: 13px;
        line-height: 1.8;
        color: rgba(237, 228, 208, 0.72);
        min-height: 1em;
      }

      .detail-text-panel__divider {
        margin: 18px 0;
        border: none;
        border-top: 1px solid rgba(148, 130, 100, 0.12);
        opacity: 0;
        transition: opacity 400ms ease;
      }

      .detail-text-panel__divider.is-visible {
        opacity: 1;
      }

      .detail-text-panel__era-title {
        margin: 0;
        color: #b8945c;
        font-size: 15px;
        font-weight: 600;
        min-height: 1.2em;
      }

      .detail-text-panel__era-summary {
        margin: 8px 0 0;
        font-size: 13px;
        line-height: 1.7;
        color: rgba(237, 228, 208, 0.52);
        min-height: 1em;
      }

      .detail-text-panel__sections {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .detail-text-panel__section {
        border-top: 1px solid rgba(148, 130, 100, 0.08);
        padding-top: 10px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 400ms ease, transform 400ms ease;
      }

      .detail-text-panel__section.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .detail-text-panel__section h3 {
        margin: 0;
        color: #b8945c;
        font-size: 13px;
        font-weight: 600;
      }

      .detail-text-panel__section p {
        margin: 4px 0 0;
        font-size: 12px;
        line-height: 1.6;
        color: rgba(237, 228, 208, 0.42);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="webgl-container"></div>
      <div id="css3d-container"></div>

      <header class="hero-copy">
        <p class="hero-copy__eyebrow">History of Chinese Medicine</p>
        <h1 class="hero-copy__title">中国医学发展史</h1>
        <p class="hero-copy__summary">
          从上古经验医学到现代科学传承，后续阶段将以 Three.js 圆柱螺旋画廊呈现中国医学的发展脉络。
        </p>
      </header>

      <main id="scroll-stage"></main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
